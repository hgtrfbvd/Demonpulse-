{% extends "base.html" %}
{% block title %}Races{% endblock %}

{% block content %}
<div class="page-shell home-page" style="gap:0;">

    <!-- Filter Strip -->
    <div class="race-filter-strip">
        <div class="filter-tabs">
            <button class="filter-tab active" data-code="ALL">All Races</button>
            <button class="filter-tab" data-code="GREYHOUND">🐕 Greyhounds</button>
            <button class="filter-tab" data-code="HORSE">🐴 Horses</button>
            <button class="filter-tab" data-code="HARNESS">🏇 Harness</button>
        </div>
        <div class="filter-strip-right">
            <span class="refresh-dot" id="refreshDot"></span>
            <span class="filter-meta" id="filterMeta">Loading…</span>
        </div>
    </div>

    <!-- Next to Jump Strip -->
    <div class="ntj-strip" id="ntjStrip">
        <div class="ntj-chip ntj-upcoming">
            <span class="ntj-track">Loading…</span>
            <span class="ntj-race"></span>
            <span class="ntj-time">—</span>
        </div>
    </div>

    <!-- Race Board -->
    <div class="race-board" id="raceBoard" style="padding: 16px 20px; display:flex; flex-direction:column; gap:10px;">
        <div class="board-empty" style="padding:32px; text-align:center; color:var(--text-dim);">Loading board…</div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/home.js"></script>
{% endblock %}
