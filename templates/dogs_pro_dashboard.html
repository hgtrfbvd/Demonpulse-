<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemonPulse — Pro Greyhound Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --dp-bg: #0d0f14;
      --dp-surface: #161a24;
      --dp-border: #2a2f3e;
      --dp-text: #e8eaf0;
      --dp-muted: #7b8299;
      --dp-accent: #3b82f6;
      --dp-green: #22c55e;
      --dp-red: #ef4444;
      --dp-yellow: #f59e0b;
      --dp-purple: #a855f7;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--dp-bg);
      color: var(--dp-text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* ── Top bar ── */
    #topbar {
      background: var(--dp-surface);
      border-bottom: 1px solid var(--dp-border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #topbar .logo { font-weight: 700; font-size: 1.1rem; color: var(--dp-accent); letter-spacing: 1px; }
    #topbar .status-pill {
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 99px;
      border: 1px solid var(--dp-border);
      color: var(--dp-muted);
    }
    #topbar .status-pill.live { border-color: var(--dp-green); color: var(--dp-green); }
    #clock { margin-left: auto; font-size: 0.85rem; color: var(--dp-muted); }
    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    /* ── Panels ── */
    .panel {
      display: flex;
      flex-direction: column;
      background: var(--dp-surface);
      border-right: 1px solid var(--dp-border);
      overflow: hidden;
    }
    #panel-left  { width: 260px; flex-shrink: 0; }
    #panel-center { flex: 1; border-right: 1px solid var(--dp-border); }
    #panel-right  { width: 300px; flex-shrink: 0; border-right: none; }
    .panel-header {
      background: #1e2330;
      padding: 8px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--dp-muted);
      border-bottom: 1px solid var(--dp-border);
      flex-shrink: 0;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 8px; }
    /* ── Race list ── */
    .race-item {
      padding: 7px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .race-item:hover { background: #252b3b; border-color: var(--dp-border); }
    .race-item.active { background: #1a2744; border-color: var(--dp-accent); }
    .race-item .track { font-weight: 600; }
    .race-item .meta { color: var(--dp-muted); font-size: 0.75rem; }
    .status-badge {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }
    .status-CAPTURED   { background: #2a2f3e; color: #94a3b8; }
    .status-EXTRACTED  { background: #1e3a5f; color: #60a5fa; }
    .status-ANALYSED   { background: #1a3a2a; color: #4ade80; }
    .status-SETTLED    { background: #3b1f5e; color: #c084fc; }
    /* ── Runners table ── */
    .runners-table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
    .runners-table th {
      background: #1e2330;
      color: var(--dp-muted);
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--dp-border);
      position: sticky;
      top: 0;
    }
    .runners-table td { padding: 6px 8px; border-bottom: 1px solid #1e2330; }
    .runners-table tr:hover td { background: #1e2330; }
    .runners-table tr.primary td { border-left: 3px solid var(--dp-green); }
    .runners-table tr.secondary td { border-left: 3px solid var(--dp-yellow); }
    .runners-table tr.scratched td { opacity: 0.4; text-decoration: line-through; }
    .box-pill {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      text-align: center;
      line-height: 22px;
      font-weight: 700;
      font-size: 0.8rem;
    }
    /* Standard box colours */
    .box-1 { background: #ef4444; color: #fff; }
    .box-2 { background: #3b82f6; color: #fff; }
    .box-3 { background: #f59e0b; color: #000; }
    .box-4 { background: #22c55e; color: #000; }
    .box-5 { background: #000; color: #fff; border: 1px solid #444; }
    .box-6 { background: #fff; color: #000; }
    .box-7 { background: #f97316; color: #fff; }
    .box-8 { background: #ec4899; color: #fff; }
    /* ── Engine output ── */
    .engine-card {
      background: #1a2030;
      border: 1px solid var(--dp-border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
    }
    .engine-card h6 { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dp-muted); margin-bottom: 8px; }
    .engine-field { display: flex; justify-content: space-between; font-size: 0.82rem; padding: 3px 0; }
    .engine-field .label { color: var(--dp-muted); }
    .engine-field .value { font-weight: 600; }
    /* ── Tempo badge ── */
    .tempo-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    .tempo-FAST     { background: #7f1d1d; color: #fca5a5; }
    .tempo-MODERATE { background: #1c3a2a; color: #6ee7b7; }
    .tempo-SLOW     { background: #1e2b4a; color: #93c5fd; }
    /* ── Win probability bars ── */
    .prob-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.78rem; }
    .prob-bar-label { width: 22px; text-align: center; }
    .prob-bar-track { flex: 1; background: #1e2330; border-radius: 3px; height: 14px; overflow: hidden; }
    .prob-bar-fill  { height: 100%; background: var(--dp-accent); border-radius: 3px; transition: width 0.5s; }
    .prob-bar-pct   { width: 40px; text-align: right; color: var(--dp-muted); }
    /* ── Confidence meter ── */
    .conf-meter {
      background: #1e2330;
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin: 4px 0;
    }
    .conf-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.5s;
    }
    /* ── Bottom tabs ── */
    #bottom-panel {
      height: 220px;
      background: var(--dp-surface);
      border-top: 1px solid var(--dp-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #bottom-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--dp-border); flex-shrink: 0; }
    .btab {
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      color: var(--dp-muted);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .btab.active { color: var(--dp-text); border-bottom-color: var(--dp-accent); }
    .btab:hover  { color: var(--dp-text); }
    #bottom-content { flex: 1; overflow: auto; padding: 10px; font-size: 0.78rem; }
    pre.raw { background: #0d0f14; color: #94a3b8; padding: 8px; border-radius: 6px; font-size: 0.72rem; overflow: auto; max-height: 150px; }
    /* ── Next-up queue ── */
    .nextup-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 5px;
      margin-bottom: 4px;
      background: #1a2030;
      font-size: 0.78rem;
    }
    .nextup-countdown { font-weight: 700; color: var(--dp-yellow); min-width: 45px; }
    .nextup-countdown.imminent { color: var(--dp-red); }
    /* ── Pass/Take badge ── */
    .filter-TAKE { color: var(--dp-green); font-weight: 700; }
    .filter-PASS { color: var(--dp-red); font-weight: 700; }
    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2f3e; border-radius: 99px; }
    .text-muted-dp { color: var(--dp-muted); }
    .section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--dp-muted); margin: 10px 0 4px; }
    #no-packet-msg { text-align: center; color: var(--dp-muted); padding: 40px 20px; font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">🐾 DEMONPULSE</span>
  <span class="status-pill live">GREYHOUND PRO</span>
  <span class="status-pill" id="env-badge">LIVE</span>
  <span id="clock"></span>
</div>

<!-- Main 3-panel layout -->
<div id="main">

  <!-- LEFT PANEL: meetings/races list + next-up -->
  <div class="panel" id="panel-left">
    <div class="panel-header">📋 Race Queue</div>
    <div style="padding: 6px 8px; border-bottom: 1px solid var(--dp-border); flex-shrink:0;">
      <div class="section-title">Next Up</div>
      <div id="nextup-list"><span class="text-muted-dp" style="font-size:0.78rem;">Loading…</span></div>
    </div>
    <div class="panel-header" style="margin-top:0;">All Races</div>
    <div class="panel-body" id="race-list">
      <span class="text-muted-dp" style="font-size:0.78rem;">Loading…</span>
    </div>
  </div>

  <!-- CENTER PANEL: race workstation -->
  <div class="panel" id="panel-center">
    <div class="panel-header" id="race-header-label">🏁 Race Workstation</div>
    <div class="panel-body" id="race-body">
      <div id="no-packet-msg">← Select a race from the queue</div>
    </div>
  </div>

  <!-- RIGHT PANEL: analyst rail -->
  <div class="panel" id="panel-right">
    <div class="panel-header">📊 Analyst Rail</div>
    <div class="panel-body" id="analyst-body">
      <div class="text-muted-dp" style="font-size:0.78rem; text-align:center; padding:20px 0;">Select a race</div>
    </div>
  </div>

</div><!-- #main -->

<!-- Bottom panel: tabbed data -->
<div id="bottom-panel">
  <div id="bottom-tabs">
    <div class="btab active" data-tab="screenshots">Screenshots</div>
    <div class="btab" data-tab="raw">Raw Data</div>
    <div class="btab" data-tab="learning">Learning</div>
    <div class="btab" data-tab="results">Results</div>
    <div class="btab" data-tab="logs">Notes / Logs</div>
  </div>
  <div id="bottom-content">
    <span class="text-muted-dp">No race selected.</span>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let _packets = [];        // list of packet summaries
let _activeUid = null;    // currently selected race_uid
let _packetCache = {};    // uid → full packet
let _activeBottomTab = "screenshots";
let _countdownInterval = null;
const _IMMINENT_THRESHOLD_SECS = 300;  // 5 minutes before jump = imminent

// ──────────────────────────────────────────────
// Clock
// ──────────────────────────────────────────────
function _tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-AU', { timeZone: 'Australia/Sydney', hour: '2-digit', minute: '2-digit', second: '2-digit' })
    + ' AEST';
}
setInterval(_tick, 1000);
_tick();

// ──────────────────────────────────────────────
// Utilities
// ──────────────────────────────────────────────
function formatTrack(slug) {
  if (!slug) return '—';
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s ?? '');
  return d.innerHTML;
}

function statusBadge(status) {
  const s = (status || 'CAPTURED').toUpperCase();
  return `<span class="status-badge status-${s}">${s}</span>`;
}

function confColor(conf) {
  if (conf >= 0.75) return '#22c55e';
  if (conf >= 0.55) return '#f59e0b';
  return '#ef4444';
}

function secsToJump(raceTime) {
  if (!raceTime) return null;
  const now = new Date();
  // Accept HH:MM or ISO
  let target;
  if (/^\d{2}:\d{2}/.test(raceTime)) {
    const [h, m] = raceTime.split(':').map(Number);
    target = new Date(now);
    target.setHours(h, m, 0, 0);
  } else {
    target = new Date(raceTime);
  }
  return Math.round((target - now) / 1000);
}

function formatCountdown(secs) {
  if (secs === null) return '—';
  if (secs <= 0) return 'LIVE';
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// ──────────────────────────────────────────────
// Load packet list
// ──────────────────────────────────────────────
async function loadPacketList() {
  try {
    const res = await fetch('/api/packet/list');
    const data = await res.json();
    if (data.ok) {
      _packets = data.packets || [];
      renderRaceList();
      renderNextUp();
    }
  } catch (e) {
    document.getElementById('race-list').innerHTML =
      `<span style="color:var(--dp-red);font-size:0.78rem;">Error loading races: ${escHtml(e.message)}</span>`;
  }
}

// ──────────────────────────────────────────────
// Render race list (left panel)
// ──────────────────────────────────────────────
function renderRaceList() {
  const el = document.getElementById('race-list');
  if (!_packets.length) {
    el.innerHTML = '<span class="text-muted-dp" style="font-size:0.78rem;">No races today</span>';
    return;
  }
  el.innerHTML = _packets.map(p => {
    const active = p.race_uid === _activeUid ? ' active' : '';
    const secs = secsToJump(p.race_time);
    const countdown = secs !== null && secs > 0 ? `<span style="color:var(--dp-muted);font-size:0.72rem;">${formatCountdown(secs)}</span>` : '';
    return `<div class="race-item${active}" onclick="selectRace('${escHtml(p.race_uid)}')">
      <div>
        <div class="track">${escHtml(formatTrack(p.track_name))} R${escHtml(p.race_number)}</div>
        <div class="meta">${escHtml(p.race_time || '—')} ${statusBadge(p.status)}</div>
      </div>
      ${countdown}
    </div>`;
  }).join('');
}

// ──────────────────────────────────────────────
// Render next-up queue
// ──────────────────────────────────────────────
function renderNextUp() {
  const el = document.getElementById('nextup-list');
  const upcoming = _packets
    .filter(p => {
      const s = secsToJump(p.race_time);
      return s !== null && s > 0 && s < 3600;
    })
    .sort((a, b) => (secsToJump(a.race_time) || 9999) - (secsToJump(b.race_time) || 9999))
    .slice(0, 5);

  if (!upcoming.length) {
    el.innerHTML = '<span class="text-muted-dp" style="font-size:0.75rem;">None within 1hr</span>';
    return;
  }

  el.innerHTML = upcoming.map(p => {
    const secs = secsToJump(p.race_time);
    const imminent = secs < _IMMINENT_THRESHOLD_SECS ? ' imminent' : '';
    return `<div class="nextup-item" onclick="selectRace('${escHtml(p.race_uid)}')">
      <span class="nextup-countdown${imminent}" data-racetime="${escHtml(p.race_time)}">${formatCountdown(secs)}</span>
      <span>${escHtml(formatTrack(p.track_name))} R${escHtml(p.race_number)}</span>
    </div>`;
  }).join('');
}

// Live countdown updates
setInterval(() => {
  document.querySelectorAll('.nextup-countdown[data-racetime]').forEach(el => {
    const secs = secsToJump(el.dataset.racetime);
    el.textContent = formatCountdown(secs);
    if (secs !== null && secs < _IMMINENT_THRESHOLD_SECS) el.classList.add('imminent');
    else el.classList.remove('imminent');
  });
}, 1000);

// ──────────────────────────────────────────────
// Select and render a race packet
// ──────────────────────────────────────────────
async function selectRace(uid) {
  _activeUid = uid;
  renderRaceList();

  const centerBody = document.getElementById('race-body');
  const analystBody = document.getElementById('analyst-body');
  const headerLabel = document.getElementById('race-header-label');
  centerBody.innerHTML = '<span class="text-muted-dp">Loading packet…</span>';
  analystBody.innerHTML = '<span class="text-muted-dp">Loading…</span>';

  let packet;
  if (_packetCache[uid]) {
    packet = _packetCache[uid];
  } else {
    try {
      const res = await fetch(`/api/packet/${encodeURIComponent(uid)}`);
      const data = await res.json();
      if (!data.ok) {
        centerBody.innerHTML = `<span style="color:var(--dp-red);">Error: ${escHtml(data.error)}</span>`;
        return;
      }
      packet = data.packet;
      _packetCache[uid] = packet;
    } catch (e) {
      centerBody.innerHTML = `<span style="color:var(--dp-red);">Fetch error: ${escHtml(e.message)}</span>`;
      return;
    }
  }

  const summary = _packets.find(p => p.race_uid === uid) || {};
  headerLabel.textContent = `🏁 ${formatTrack(summary.track_name || packet.track_name)} R${summary.race_number || packet.race_number} — ${summary.race_time || packet.race_time || ''}`;

  renderCenter(packet);
  renderAnalyst(packet);
  renderBottomTab(packet);
}

// ──────────────────────────────────────────────
// Center panel: runners table + engine output
// ──────────────────────────────────────────────
function renderCenter(packet) {
  const el = document.getElementById('race-body');
  const eng = packet.engine_output || {};
  const extracted = packet.extracted_data || {};
  const runners = extracted.runners || packet.runners || [];

  const primaryBox = (eng.primary || {}).box;
  const secondaryBox = (eng.secondary || {}).box;

  let html = '';

  // Race info strip
  html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;font-size:0.8rem;">
    <span>${statusBadge(packet.status)}</span>
    ${packet.track_name ? `<span><b>${escHtml(formatTrack(packet.track_name))}</b> R${escHtml(packet.race_number)}</span>` : ''}
    ${packet.distance_m ? `<span class="text-muted-dp">${escHtml(packet.distance_m)}m</span>` : ''}
    ${packet.grade ? `<span class="text-muted-dp">${escHtml(packet.grade)}</span>` : ''}
    ${packet.track_condition ? `<span class="text-muted-dp">Track: ${escHtml(packet.track_condition)}</span>` : ''}
  </div>`;

  // Runners table
  if (runners.length) {
    html += `<div style="overflow-x:auto;">
    <table class="runners-table">
      <thead><tr>
        <th>Box</th><th>Runner</th><th>Trainer</th>
        <th>Early Spd</th><th>Last 4</th><th>Odds</th><th>Score</th>
      </tr></thead>
      <tbody>`;

    runners.forEach(r => {
      const box = r.box ?? r.box_num;
      const isPrimary = box === primaryBox;
      const isSecondary = box === secondaryBox;
      const rowClass = r.scratched ? 'scratched' : isPrimary ? 'primary' : isSecondary ? 'secondary' : '';
      const scoredR = (eng.scored_runners || []).find(s => s.box === box);
      const score = scoredR ? scoredR.score.toFixed(3) : '—';
      html += `<tr class="${rowClass}">
        <td><span class="box-pill box-${box}">${escHtml(box)}</span></td>
        <td>${escHtml(r.runner_name || r.name || '—')}${isPrimary ? ' 🥇' : isSecondary ? ' 🥈' : ''}</td>
        <td class="text-muted-dp" style="font-size:0.75rem;">${escHtml(r.trainer || '—')}</td>
        <td>${escHtml(r.early_speed_rating ?? '—')}</td>
        <td style="font-family:monospace;">${escHtml(r.last4 || '—')}</td>
        <td>${escHtml(r.odds || r.price || '—')}</td>
        <td style="color:${scoredR && !r.scratched ? 'var(--dp-accent)' : 'var(--dp-muted)'};">${escHtml(score)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  } else {
    html += `<p class="text-muted-dp">No runner data extracted yet. Run the pipeline to capture.</p>`;
  }

  // Engine output summary
  if (eng.primary) {
    html += `<div class="engine-card" style="margin-top:12px;">
      <h6>V7 Engine Output</h6>
      ${_engineField('Primary', `Box ${eng.primary.box} ${eng.primary.name || ''}`)}
      ${eng.secondary ? _engineField('Secondary', `Box ${eng.secondary.box} ${eng.secondary.name || ''}`) : ''}
      ${_engineField('Tempo', eng.tempo || '—')}
      ${_engineField('Confidence', eng.confidence !== undefined ? (eng.confidence * 100).toFixed(1) + '%' : '—')}
      ${_engineField('Filter', eng.pass_filter ? '<span class="filter-TAKE">TAKE</span>' : '<span class="filter-PASS">PASS</span>')}
      ${eng.pass_reason ? _engineField('Reason', eng.pass_reason) : ''}
    </div>`;
    if (eng.notes && eng.notes.length) {
      html += `<div style="font-size:0.78rem;color:var(--dp-muted);margin-top:4px;">` +
        eng.notes.map(n => `<div>• ${escHtml(n)}</div>`).join('') + `</div>`;
    }
  }

  // Pipeline run button
  html += `<div style="margin-top:14px;">
    <button onclick="runPipeline('${escHtml(packet.race_uid)}')"
      style="background:var(--dp-accent);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:600;">
      ▶ Run Pipeline
    </button>
    <span id="run-status-${escHtml(packet.race_uid)}" style="margin-left:10px;font-size:0.78rem;color:var(--dp-muted);"></span>
  </div>`;

  el.innerHTML = html;
}

function _engineField(label, val) {
  return `<div class="engine-field"><span class="label">${escHtml(label)}</span><span class="value">${val}</span></div>`;
}

// ──────────────────────────────────────────────
// Right panel: analyst rail
// ──────────────────────────────────────────────
function renderAnalyst(packet) {
  const el = document.getElementById('analyst-body');
  const eng = packet.engine_output || {};
  const sim = packet.simulation_output || {};
  let html = '';

  // Tempo
  const tempo = eng.tempo || 'MODERATE';
  html += `<div class="section-title">Tempo</div>
    <div style="margin-bottom:10px;"><span class="tempo-badge tempo-${tempo}">${tempo}</span></div>`;

  // Confidence meter
  if (eng.confidence !== undefined) {
    const conf = eng.confidence;
    const pct = (conf * 100).toFixed(1);
    const color = confColor(conf);
    html += `<div class="section-title">Engine Confidence</div>
      <div class="conf-meter"><div class="conf-fill" style="width:${pct}%;background:${color};"></div></div>
      <div style="font-size:0.78rem;color:${color};margin-bottom:8px;">${pct}% — ${eng.pass_filter ? '<span class="filter-TAKE">TAKE</span>' : '<span class="filter-PASS">PASS</span>'}</div>`;
  }

  // Sim win probabilities
  if (sim.win_probabilities && Object.keys(sim.win_probabilities).length) {
    html += `<div class="section-title">Sim Win %</div>`;
    const maxPct = Math.max(...Object.values(sim.win_probabilities));
    Object.entries(sim.win_probabilities)
      .sort((a, b) => b[1] - a[1])
      .forEach(([box, pct]) => {
        const width = maxPct > 0 ? (pct / maxPct * 100).toFixed(1) : 0;
        html += `<div class="prob-bar-row">
          <span class="prob-bar-label box-pill box-${box}">${box}</span>
          <div class="prob-bar-track"><div class="prob-bar-fill" style="width:${width}%;"></div></div>
          <span class="prob-bar-pct">${pct}%</span>
        </div>`;
      });

    if (sim.chaos_rating !== undefined) {
      const chaosColor = sim.chaos_rating > 0.7 ? 'var(--dp-red)' : sim.chaos_rating > 0.5 ? 'var(--dp-yellow)' : 'var(--dp-green)';
      html += `<div style="margin:8px 0 4px;font-size:0.78rem;">Chaos: <span style="color:${chaosColor};font-weight:700;">${(sim.chaos_rating * 100).toFixed(1)}%</span></div>`;
    }

    if (sim.most_likely_scenario && sim.most_likely_scenario.length) {
      html += `<div class="section-title">Most Likely Trifecta</div>
        <div style="font-size:0.85rem;font-weight:700;margin-bottom:4px;">
          ${sim.most_likely_scenario.slice(0, 3).map(b => `<span class="box-pill box-${b}" style="margin-right:3px;">${b}</span>`).join('')}
        </div>`;
    }
    if (sim.alternate_scenario && sim.alternate_scenario.length) {
      html += `<div style="font-size:0.75rem;color:var(--dp-muted);">Alt: ${sim.alternate_scenario.slice(0, 3).map(b => `<span class="box-pill box-${b}" style="margin-right:2px;transform:scale(0.85);display:inline-block;">${b}</span>`).join('')}</div>`;
    }
  }

  // Learning summary
  const learn = packet.learning || {};
  if (learn.error_tags && learn.error_tags.length) {
    html += `<div class="section-title" style="margin-top:10px;">Learning Tags</div>
      <div style="font-size:0.75rem;">` +
      learn.error_tags.map(t => `<span style="background:#1e2330;padding:2px 7px;border-radius:4px;margin:2px;display:inline-block;">${escHtml(t)}</span>`).join(' ') +
      `</div>`;
  }

  el.innerHTML = html || '<div class="text-muted-dp" style="font-size:0.78rem;">No analysis data yet.</div>';
}

// ──────────────────────────────────────────────
// Bottom tabs
// ──────────────────────────────────────────────
document.querySelectorAll('.btab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.btab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    _activeBottomTab = tab.dataset.tab;
    if (_activeUid && _packetCache[_activeUid]) {
      renderBottomTab(_packetCache[_activeUid]);
    }
  });
});

function renderBottomTab(packet) {
  const el = document.getElementById('bottom-content');
  switch (_activeBottomTab) {
    case 'screenshots': renderScreenshots(packet, el); break;
    case 'raw':         el.innerHTML = `<pre class="raw">${escHtml(JSON.stringify(packet.extracted_data || {}, null, 2))}</pre>`; break;
    case 'learning':    renderLearning(packet, el); break;
    case 'results':     renderResults(packet, el); break;
    case 'logs': {
      const eng = packet.engine_output || {};
      const sim = packet.simulation_output || {};
      const allNotes = [
        ...(eng.notes || []),
        ...(sim.notes || []),
      ];
      el.innerHTML = allNotes.length
        ? allNotes.map(n => `<div style="color:var(--dp-muted);margin-bottom:3px;">• ${escHtml(n)}</div>`).join('')
        : '<span class="text-muted-dp">No notes.</span>';
      break;
    }
    default: el.innerHTML = '<span class="text-muted-dp">—</span>';
  }
}

function renderScreenshots(packet, el) {
  const shots = packet.screenshots || {};
  const keys = Object.keys(shots);
  if (!keys.length) {
    el.innerHTML = '<span class="text-muted-dp">No screenshots captured yet.</span>';
    return;
  }
  el.innerHTML = `<div style="display:flex;gap:10px;flex-wrap:wrap;">` +
    keys.map(k => `<div style="text-align:center;">
      <div style="font-size:0.72rem;color:var(--dp-muted);margin-bottom:3px;">${escHtml(k)}</div>
      <div style="background:#1e2330;padding:8px;border-radius:6px;font-size:0.75rem;color:var(--dp-muted);">
        📷 ${escHtml(shots[k].split('/').pop())}
      </div>
    </div>`).join('') + `</div>`;
}

function renderLearning(packet, el) {
  const learn = packet.learning || {};
  if (!learn.error_tags) {
    el.innerHTML = '<span class="text-muted-dp">No learning data yet.</span>';
    return;
  }
  let html = `<div style="margin-bottom:6px;"><b>Tags:</b> ${(learn.error_tags || []).map(t => `<code>${escHtml(t)}</code>`).join(', ')}</div>`;
  if (learn.notes && learn.notes.length) {
    html += `<div>${learn.notes.map(n => `<div>• ${escHtml(n)}</div>`).join('')}</div>`;
  }
  if (learn.adjustments && learn.adjustments.length) {
    html += `<div style="margin-top:6px;color:var(--dp-yellow);">${learn.adjustments.map(a => `<div>⚠ ${escHtml(a)}</div>`).join('')}</div>`;
  }
  el.innerHTML = html;
}

function renderResults(packet, el) {
  const result = packet.result || {};
  if (!result.finishing_order || !result.finishing_order.length) {
    el.innerHTML = '<span class="text-muted-dp">No results available yet.</span>';
    return;
  }
  el.innerHTML = `
    <div style="margin-bottom:6px;"><b>Finishing Order:</b>
      ${result.finishing_order.map((b, i) => `<span class="box-pill box-${b}" style="margin-right:3px;">${b}</span><span style="font-size:0.72rem;color:var(--dp-muted);">(${i+1})</span>`).join(' ')}
    </div>
    ${result.official_time ? `<div><b>Time:</b> ${escHtml(result.official_time)}s</div>` : ''}
    ${result.margins && result.margins.length ? `<div><b>Margins:</b> ${result.margins.map(m => m + 'L').join(', ')}</div>` : ''}
  `;
}

// ──────────────────────────────────────────────
// Run pipeline
// ──────────────────────────────────────────────
async function runPipeline(uid) {
  const statusEl = document.getElementById(`run-status-${uid}`);
  if (statusEl) statusEl.textContent = 'Running…';
  try {
    const res = await fetch(`/api/packet/${encodeURIComponent(uid)}/run`, { method: 'POST' });
    const data = await res.json();
    if (statusEl) statusEl.textContent = data.ok ? `✅ ${data.status}` : `❌ ${data.error}`;
    if (data.ok) {
      delete _packetCache[uid];
      await selectRace(uid);
    }
  } catch (e) {
    if (statusEl) statusEl.textContent = `❌ ${e.message}`;
  }
}

// ──────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────
loadPacketList();
setInterval(loadPacketList, 30000); // refresh list every 30s
</script>
