<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}DemonPulse{% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/tokens.css">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/tabs.css">
    <link rel="stylesheet" href="/static/css/pages.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="topbar">
    <div class="logo">DEMONPULSE</div>

    <div class="topbar-right">
        <div id="envBadge" class="badge"></div>
        <div id="shadowStatus" class="badge"></div>
        <div id="userInfo"></div>
    </div>
</div>

<div class="layout">

    <div class="sidebar">
        <a href="/" class="nav-item">Home</a>
        <a href="/live" class="nav-item">Live</a>
        <a href="/simulator" class="nav-item">Simulator</a>
        <a href="/betting" class="nav-item">Betting</a>
        <a href="/reports" class="nav-item">Reports</a>
        <a href="/learning" class="nav-item">AI Learning</a>
        <a href="/backtesting" class="nav-item">Backtesting</a>
        <a href="/settings" class="nav-item">Settings</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

<script src="/static/js/core.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
