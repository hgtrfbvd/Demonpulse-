<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DemonPulse V8</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--void:#04040b;--deep:#080812;--panel:#0d0d1a;--card:#111120;--hover:#171728;--lift:#1e1e32;
--red:#c41111;--red-hot:#ff1f1f;--red-dim:rgba(196,17,17,.14);--red-glow:rgba(196,17,17,.4);--red-border:rgba(196,17,17,.28);
--amber:#d97700;--amber-dim:rgba(217,119,0,.14);--amber-glow:rgba(217,119,0,.4);
--green:#00b845;--green-dim:rgba(0,184,69,.12);--green-glow:rgba(0,184,69,.35);
--blue:#0066dd;--blue-dim:rgba(0,102,221,.12);--blue-glow:rgba(0,102,221,.35);
--purple:#7722dd;--gold:#b89000;
--border:rgba(255,255,255,.065);--bdr:rgba(196,17,17,.22);
--t:#dde1eb;--td:#6b6e82;--tm:#282a3a;
--fb:'Orbitron',monospace;--fd:'Share Tech Mono',monospace;--fu:'Barlow Condensed',sans-serif}
html,body,#root{height:100%;background:var(--void);color:var(--t);font-family:var(--fu);overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--deep)}::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}
button{font-family:var(--fu);cursor:pointer}
input,select{font-family:var(--fu)}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRed{0%,100%{box-shadow:0 0 8px var(--red-glow)}50%{box-shadow:0 0 22px var(--red-glow),0 0 44px rgba(196,17,17,.18)}}
@keyframes pulseAmber{0%,100%{box-shadow:0 0 6px var(--amber-glow)}50%{box-shadow:0 0 18px var(--amber-glow)}}
@keyframes ticker{0%{transform:translateX(100vw)}100%{transform:translateX(-200%)}}
@keyframes scanIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes countBlink{0%,100%{color:var(--red-hot);opacity:1}50%{opacity:.6}}
@keyframes hotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.fade-up{animation:fadeUp .35s ease forwards}
.scan-in{animation:scanIn .25s ease forwards}
.pulse-red{animation:pulseRed 2.2s ease infinite}
.pulse-amber{animation:pulseAmber 2s ease infinite}
.hot-pulse{animation:hotPulse 1.5s ease infinite}

/* LAYOUT */
.app{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:44px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:0}

/* SIDEBAR */
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{font-family:var(--fb);font-size:17px;font-weight:900;color:var(--red-hot);letter-spacing:2px;text-shadow:0 0 12px var(--red-glow)}
.sb-version{font-family:var(--fd);font-size:10px;color:var(--td);letter-spacing:1px;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px}
.sb-section{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--tm);text-transform:uppercase;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:5px;cursor:pointer;color:var(--td);font-size:13px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;transition:all .18s;border:1px solid transparent;margin-bottom:1px;user-select:none}
.nav-item:hover{color:var(--t);background:var(--hover)}
.nav-item.active{color:var(--red-hot);background:var(--red-dim);border-color:var(--red-border)}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center}
.nav-item .ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-bottom{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:5px;background:var(--card)}
.sb-user-name{font-size:13px;font-weight:600;color:var(--t)}
.sb-user-role{font-size:10px;color:var(--td);letter-spacing:.5px;text-transform:uppercase}
.sb-logout{margin-top:6px;width:100%;padding:7px;background:transparent;border:1px solid var(--border);color:var(--td);border-radius:4px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .18s}
.sb-logout:hover{border-color:var(--red-border);color:var(--red-hot)}

/* TOPBAR */
.tb-left{display:flex;align-items:center;gap:14px}
.tb-state{display:flex;align-items:center;gap:6px;font-family:var(--fd);font-size:11px;color:var(--td)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.tb-right{display:flex;align-items:center;gap:16px}
.tb-metric{text-align:right}
.tb-metric-val{font-family:var(--fd);font-size:13px;font-weight:700}
.tb-metric-lbl{font-size:9px;color:var(--td);letter-spacing:.5px;text-transform:uppercase}
.tb-metric-pos{color:var(--green)}
.tb-metric-neg{color:var(--red-hot)}

/* TICKER */
.ticker-wrap{height:26px;background:rgba(196,17,17,.07);border-bottom:1px solid var(--red-border);overflow:hidden;display:flex;align-items:center;flex-shrink:0}
.ticker-content{display:inline-block;animation:ticker 50s linear infinite;font-family:var(--fd);font-size:10.5px;color:var(--td);white-space:nowrap;padding:0 20px}
.ticker-item{margin-right:48px}
.ticker-item .ti-sig{margin-right:6px;font-weight:700}
.sig-sniper{color:var(--red-hot)}
.sig-value{color:var(--amber)}
.sig-gem{color:var(--green)}
.sig-watch{color:var(--blue)}
.sig-risk{color:#ff6688}
.sig-no_bet{color:var(--td)}

/* SIGNAL BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.badge-sniper{background:linear-gradient(135deg,#a80000,#700000);color:#fff;box-shadow:0 0 8px rgba(196,17,17,.4)}
.badge-value{background:linear-gradient(135deg,#a05c00,#6b3d00);color:#ffcc66}
.badge-gem{background:linear-gradient(135deg,#005929,#003a1a);color:#44ffaa}
.badge-watch{background:linear-gradient(135deg,#002688,#001a5c);color:#88aaff}
.badge-risk{background:linear-gradient(135deg,#550033,#3a0022);color:#ff88aa}
.badge-no_bet{background:rgba(255,255,255,.06);color:var(--td)}

/* PANELS */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.panel-hot{border-color:var(--red-border);box-shadow:0 0 16px rgba(196,17,17,.1)}
.panel-amber{border-color:rgba(217,119,0,.3)}
.panel-gem{border-color:rgba(0,184,69,.25)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3)}
.ph-title{font-family:var(--fb);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--td);text-transform:uppercase}
.ph-action{font-size:11px;color:var(--red-hot);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.ph-action:hover{text-decoration:underline}

/* BUTTONS */
.btn{padding:8px 18px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border:none;transition:all .18s;cursor:pointer}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-hot);box-shadow:0 0 12px var(--red-glow)}
.btn-secondary{background:transparent;color:var(--td);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--bdr);color:var(--t)}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{box-shadow:0 0 12px var(--amber-glow)}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-icon{padding:6px 8px;background:transparent;border:1px solid var(--border);color:var(--td);border-radius:4px;transition:all .18s}
.btn-icon:hover{border-color:var(--bdr);color:var(--red-hot)}

/* INPUTS */
.input{background:var(--card);border:1px solid var(--border);color:var(--t);padding:9px 13px;border-radius:4px;font-family:var(--fd);font-size:13px;outline:none;transition:border-color .18s;width:100%}
.input:focus{border-color:var(--red-border)}
.input::placeholder{color:var(--td)}
.label{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--td);text-transform:uppercase;margin-bottom:5px;display:block}
.slider{-webkit-appearance:none;width:100%;height:3px;background:var(--card);border-radius:2px;outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--red);border-radius:50%;cursor:pointer;box-shadow:0 0 6px var(--red-glow)}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle{width:38px;height:20px;background:var(--card);border-radius:10px;position:relative;cursor:pointer;border:1px solid var(--border);transition:background .2s}
.toggle.on{background:var(--red);border-color:var(--red-border)}
.toggle-knob{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle.on .toggle-knob{left:20px}

/* RACE CARD (home) */
.race-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.race-card:hover{border-color:var(--red-border);background:var(--hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.race-card.hot{border-color:var(--red-border);box-shadow:0 0 14px rgba(196,17,17,.12)}
.rc-track{font-family:var(--fb);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--t);text-transform:uppercase}
.rc-info{font-size:12px;color:var(--td);margin-top:2px}
.rc-countdown{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--red-hot)}
.rc-countdown.urgent{animation:countBlink 1s ease infinite}
.rc-selection{font-size:13px;font-weight:600;color:var(--t);margin-top:8px}
.rc-odds{font-family:var(--fd);font-size:13px;color:var(--amber)}
.rc-ev{font-family:var(--fd);font-size:11px}
.rc-ev-pos{color:var(--green)}
.rc-ev-neg{color:var(--red-hot)}
.rc-bar{height:2px;background:linear-gradient(90deg,var(--red),transparent);position:absolute;bottom:0;left:0;right:0;opacity:.4}

/* HORSE CARD */
.horse-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .22s}
.horse-card:hover{border-color:var(--red-border);background:var(--hover)}
.horse-card.selected{border-color:var(--red-hot);background:var(--red-dim);box-shadow:0 0 12px rgba(196,17,17,.15)}
.hc-num{font-family:var(--fd);font-size:11px;color:var(--td)}
.hc-name{font-size:15px;font-weight:700;color:var(--t);margin-top:1px}
.hc-style{font-size:11px;color:var(--td);margin-top:2px}
.hc-odds{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--amber)}
.hc-conf{font-family:var(--fd);font-size:12px}
.form-pip{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:10px;font-weight:700;margin-right:2px}
.form-1{background:rgba(0,184,69,.2);color:var(--green)}
.form-2{background:rgba(0,102,221,.2);color:var(--blue)}
.form-3{background:rgba(217,119,0,.2);color:var(--amber)}
.form-x{background:rgba(255,255,255,.06);color:var(--td)}
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px;margin-right:3px;text-transform:uppercase}
.flag-warn{background:rgba(255,30,50,.12);color:#ff6680;border:1px solid rgba(255,30,50,.2)}
.flag-ok{background:rgba(0,184,69,.1);color:#44cc77;border:1px solid rgba(0,184,69,.2)}
.flag-neutral{background:rgba(255,255,255,.05);color:var(--td);border:1px solid var(--border)}
.pbar{height:4px;background:var(--card);border-radius:2px;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:2px;transition:width .6s ease}

/* LIVE RACE TOP */
.lrt{background:var(--panel);border-bottom:1px solid var(--border);padding:18px 24px}
.lrt-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.lrt-track{font-family:var(--fb);font-size:16px;font-weight:900;color:var(--t);letter-spacing:1px;text-transform:uppercase}
.lrt-info{font-size:13px;color:var(--td)}
.lrt-countdown{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--red-hot);text-shadow:0 0 12px var(--red-glow);letter-spacing:2px}
.lrt-selection{font-size:22px;font-weight:700;color:var(--t)}
.lrt-ev-pos{font-family:var(--fd);font-size:14px;color:var(--green)}
.lrt-ev-neg{font-family:var(--fd);font-size:14px;color:var(--red-hot)}
.ai-comment{background:rgba(196,17,17,.06);border-left:3px solid var(--red-border);padding:11px 16px;font-size:13px;line-height:1.6;color:var(--td);font-style:italic}

/* BET SLIP */
.bet-slip-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border)}
.bet-slip-row:last-child{border-bottom:none}

/* TABLE */
.dp-table{width:100%;border-collapse:collapse;font-size:12px}
.dp-table th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--td);text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--deep)}
.dp-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t)}
.dp-table tr:hover td{background:var(--hover)}
.dp-table .td-mono{font-family:var(--fd)}
.td-pos{color:var(--green)}
.td-neg{color:var(--red-hot)}
.td-win{color:var(--green);font-weight:700}
.td-loss{color:var(--red-hot)}
.td-pending{color:var(--amber)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--red-border);border-radius:8px;width:min(720px,95vw);max-height:85vh;overflow-y:auto;box-shadow:0 0 40px rgba(196,17,17,.2)}

/* HOT BET ALERT */
.hot-bet-overlay{position:fixed;top:60px;right:20px;z-index:2000;animation:fadeUp .3s ease}
.hot-bet-card{background:linear-gradient(135deg,#8a0000,#5c0000);border:1px solid var(--red-hot);border-radius:8px;padding:16px 20px;box-shadow:0 0 30px rgba(196,17,17,.4);animation:hotPulse 1.5s ease infinite;min-width:260px}
.hbc-title{font-family:var(--fb);font-size:11px;font-weight:900;letter-spacing:2px;color:var(--red-hot);text-transform:uppercase;margin-bottom:6px}
.hbc-runner{font-size:20px;font-weight:700;color:#fff}
.hbc-meta{font-family:var(--fd);font-size:11px;color:rgba(255,255,255,.7);margin-top:4px}

/* MISC */
.page-pad{padding:20px 24px}
.page-title{font-family:var(--fb);font-size:14px;font-weight:700;letter-spacing:2.5px;color:var(--t);text-transform:uppercase;margin-bottom:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.mc-val{font-family:var(--fd);font-size:22px;font-weight:700}
.mc-lbl{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--td);text-transform:uppercase;margin-top:3px}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--deep);flex-shrink:0}
.tab{padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:.6px;color:var(--td);text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s}
.tab:hover{color:var(--t)}
.tab.active{color:var(--red-hot);border-bottom-color:var(--red-hot)}
.sep{color:var(--tm);margin:0 6px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-row:last-child{border-bottom:none}
.stat-lbl{font-size:12px;color:var(--td)}
.stat-val{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--t)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.chip-admin{background:rgba(196,17,17,.15);color:var(--red-hot);border:1px solid var(--red-border)}
.chip-operator{background:rgba(217,119,0,.12);color:var(--amber);border:1px solid rgba(217,119,0,.25)}
.chip-viewer{background:rgba(255,255,255,.06);color:var(--td);border:1px solid var(--border)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--red-hot);border-radius:50%;animation:spin .7s linear infinite}
.empty-state{text-align:center;padding:48px 24px;color:var(--td)}
.empty-state .es-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-state .es-msg{font-size:14px;color:var(--td)}
.conf-bar-wrap{display:flex;align-items:center;gap:8px}
.conf-bar{flex:1;height:5px;background:var(--card);border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--red-hot))}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-family:var(--fb);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--td);text-transform:uppercase}

/* CHARTS */
.chart-container{position:relative;padding:16px}
canvas{border-radius:4px}

/* LOGIN */
.login-page{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--void);position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(196,17,17,.08) 0%,transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(100,0,0,.06) 0%,transparent 60%)}
.login-grid{position:absolute;inset:0;opacity:.03;background-image:linear-gradient(var(--t) 1px,transparent 1px),linear-gradient(90deg,var(--t) 1px,transparent 1px);background-size:40px 40px}
.login-card{background:var(--panel);border:1px solid var(--red-border);border-radius:10px;padding:40px 44px;width:420px;position:relative;box-shadow:0 0 60px rgba(196,17,17,.15),0 20px 40px rgba(0,0,0,.5);animation:fadeUp .5s ease}
.login-logo{font-family:var(--fb);font-size:24px;font-weight:900;color:var(--red-hot);letter-spacing:4px;text-shadow:0 0 20px var(--red-glow);text-align:center;margin-bottom:4px}
.login-sub{font-family:var(--fd);font-size:10px;color:var(--td);text-align:center;letter-spacing:3px;margin-bottom:32px}
.login-err{background:rgba(196,17,17,.12);border:1px solid var(--red-border);border-radius:4px;padding:10px 14px;font-size:12px;color:var(--red-hot);margin-bottom:16px;text-align:center}
.login-form-group{margin-bottom:16px}
.demo-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.demo-btn{padding:8px;background:transparent;border:1px solid var(--border);color:var(--td);border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .18s}
.demo-btn:hover{border-color:var(--red-border);color:var(--t)}
.login-divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--tm);font-size:10px;letter-spacing:1px;text-transform:uppercase}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* SCROLLABLE CONTENT AREAS */
.scroll-area{overflow-y:auto;flex:1}
.sb-nav{overflow-y:auto}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}

// ──────────────────────────────────────────────
// API LAYER
// ──────────────────────────────────────────────
const API={
  token:null,
  setToken(t){this.token=t;if(t)localStorage.setItem('dp_token',t);else localStorage.removeItem('dp_token')},
  getToken(){return this.token||localStorage.getItem('dp_token')},
  async req(method,url,body){
    const headers={'Content-Type':'application/json'};
    const t=this.getToken();
    if(t)headers['Authorization']=`Bearer ${t}`;
    const opts={method,headers};
    if(body)opts.body=JSON.stringify(body);
    try{
      const r=await fetch(url,opts);
      if(r.status===401){this.setToken(null);window.location.reload();return null}
      return await r.json();
    }catch(e){console.error('API error',e);return null}
  },
  get(url){return this.req('GET',url)},
  post(url,body){return this.req('POST',url,body)},
};

// ──────────────────────────────────────────────
// DEMO DATA ENGINE (fallback)
// ──────────────────────────────────────────────
const TRACKS=['Sandown','Meadows','Cannington','Angle Park','Ballarat','Bendigo','Horsham','Mandurah'];
const HORSE_NAMES=['Dark Phoenix','Thunderstrike','Night Raider','Blaze Runner','Iron Will','Storm Chaser','Shadow Bolt','Neon Flash','Crimson Edge','Steel Fury','Ghost Wind','Red Baron'];
const JOCKEYS=['J.McDonald','D.Oliver','H.Bowman','J.Waller','C.Williams','B.Shinn','R.Fradd','J.Allen'];
const SIGNALS=['SNIPER','VALUE','GEM','WATCH','VALUE','SNIPER','RISK','NO_BET'];
const GRADES=['Grade 5','Grade 6','Grade 7','Maiden','Grade 4','Mixed Grade'];
const DISTANCES=['380m','460m','515m','595m','715m'];

function makeSeed(n){let x=n*2654435761>>>0;return()=>{x^=x<<13;x^=x>>>17;x^=x<<5;return(x>>>0)/4294967296}}

function genRaces(){
  const now=Date.now();
  return Array.from({length:10},(_,i)=>{
    const s=makeSeed(i+1);
    const track=TRACKS[i%TRACKS.length];
    const sig=SIGNALS[i%SIGNALS.length];
    const conf=+(0.45+s()*0.48).toFixed(2);
    const ev=+(-0.04+s()*0.3).toFixed(3);
    const mins=(i+1)*7+Math.floor(s()*4);
    const runners=Array.from({length:6},(_,j)=>{
      const rs2=makeSeed(i*10+j);
      return{
        name:HORSE_NAMES[(i*6+j)%HORSE_NAMES.length],
        box_num:j+1,
        odds:+(2+rs2()*10).toFixed(1),
        confidence:+(0.3+rs2()*0.65).toFixed(2),
        ev:+(-0.05+rs2()*0.28).toFixed(3),
        run_style:['LEADER','RAILER','CHASER','WIDE'][j%4],
        early_speed_rank:['FAST','MID','SLOW'][j%3],
        box_score:['STRONG','NEUTRAL','WEAK'][j%3],
        form:[1,2,3,4,5].map(()=>Math.floor(rs2()*8)+1),
        career_wins:`${Math.floor(rs2()*12)}/${Math.floor(rs2()*20)+10}`,
        best_time:`${25++(rs2()*2).toFixed(2)}`,
        trainer:'T.Smith',
        jockey:JOCKEYS[j%JOCKEYS.length],
        risk_flags:rs2()>0.7?['TRAFFIC']:rs2()>0.85?['WIDE','FADER']:[],
        barrier_wins:+(rs2()*0.55).toFixed(2),
        last_5_pos:Array.from({length:5},()=>Math.floor(rs2()*8)+1),
      };
    });
    runners.sort((a,b)=>b.confidence-a.confidence);
    return{
      id:`r${i}`,race_uid:`demo-r${i}`,
      track,race_num:i+1,
      distance:DISTANCES[i%DISTANCES.length],
      grade:GRADES[i%GRADES.length],
      jump_time:`${10+Math.floor(i/2)}:${['00','15','30','45'][i%4]}`,
      jump_ts:now/1000+mins*60,
      status:'upcoming',
      runners,
      ai_comment:`${runners[0].name} maps perfectly from box ${runners[0].box_num} with ${runners[0].run_style.toLowerCase()} style. ${runners[1].name} is the main danger from box ${runners[1].box_num}. Watch for traffic at the bend.`,
      signal_data:{
        signal:sig,
        confidence:conf,ev,
        alert_level:{SNIPER:'HOT',VALUE:'HIGH',GEM:'MEDIUM',WATCH:'LOW',RISK:'NONE',NO_BET:'NONE'}[sig],
        hot_bet:sig==='SNIPER'||(sig==='VALUE'&&ev>0.14),
        top_runner:runners[0].name,
        top_odds:runners[0].odds,
        risk_flags:conf<0.55?['LOW_CONF']:[],
      }
    };
  });
}

const DEMO_RACES=genRaces();

// ──────────────────────────────────────────────
// UTILITIES
// ──────────────────────────────────────────────
function sigClass(s){return`sig-${(s||'no_bet').toLowerCase()}`}
function badgeClass(s){return`badge badge-${(s||'no_bet').toLowerCase()}`}
function evColor(v){return v>0?'td-pos':'td-neg'}
function evFmt(v){return`${v>0?'+':''}${(v*100).toFixed(1)}%`}
function fmtPL(v){if(v==null)return'-';const n=+v;return`${n>=0?'+':''}\$${Math.abs(n).toFixed(2)}`}
function plColor(v){return+v>=0?'var(--green)':'var(--red-hot)'}
function confPct(v){return`${(+v*100).toFixed(0)}%`}
function useCountdown(targetTs){
  const [rem,setRem]=useState(0);
  useEffect(()=>{
    const tick=()=>{const d=Math.max(0,Math.floor(targetTs-(Date.now()/1000)));setRem(d)};
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[targetTs]);
  if(rem<=0)return{str:'LIVE',urgent:true};
  const m=Math.floor(rem/60),s=rem%60;
  return{str:`${m}:${s.toString().padStart(2,'0')}`,urgent:m<2};
}
function useLocalTime(){
  const [t,setT]=useState('');
  useEffect(()=>{const id=setInterval(()=>setT(new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})),1000);return()=>clearInterval(id)},[]);
  return t;
}

        React.createElement('button',{type:'submit',className:'btn btn-primary',style:{width:'100%',padding:'11px',marginTop:4},disabled:loading},

function Ticker({races}){
  const items=races.filter(r=>r.signal_data?.signal&&r.signal_data.signal!=='NO_BET');
  if(!items.length)return null;
  const content=items.map(r=>`${r.track} R${r.race_num} · ${r.signal_data.top_runner||'?'} · $${r.signal_data.top_odds||'?'}`);
  const str=items.map((r,i)=>
    `<span class="ticker-item"><span class="ti-sig ${sigClass(r.signal_data.signal)}">${r.signal_data.signal}</span>${content[i]}</span>`
  ).join('');
  return React.createElement('div',{className:'ticker-wrap'},
    React.createElement('div',{className:'ticker-content',dangerouslySetInnerHTML:{__html:str+'&nbsp;&nbsp;&nbsp;&nbsp;'.repeat(6)+str}}));
}

function PermissionToggles({userId,role,perms,onSaved}){
  const base=ROLE_DEFAULTS[role]||new Set();
  const granted=new Set(perms?.granted||[]);
  const revoked=new Set(perms?.revoked||[]);
  const [g,setG]=useState(new Set(granted));
  const [r,setR]=useState(new Set(revoked));
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  function toggle(page){
    const inBase=base.has(page);
    const inG=g.has(page);const inR=r.has(page);
    // Compute current effective state
    const effective=(inBase||inG)&&!inR;
    if(effective){
      // Turn OFF: add to revoked, remove from granted
      if(inBase){setR(p=>{const n=new Set(p);n.add(page);return n});setG(p=>{const n=new Set(p);n.delete(page);return n})}
      else{setG(p=>{const n=new Set(p);n.delete(page);return n})}
    } else {
      // Turn ON: add to granted, remove from revoked
      setR(p=>{const n=new Set(p);n.delete(page);return n});
      if(!inBase)setG(p=>{const n=new Set(p);n.add(page);return n});
    }
  }

  async function save(){
    setSaving(true);
    await API.req('PATCH',`/api/users/${userId}/permissions`,{granted:[...g],revoked:[...r]});
    setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2000);
    if(onSaved)onSaved();
  }

  return React.createElement('div',null,
    ALL_PAGES.map(page=>{
      const inBase=base.has(page);
      const effective=(inBase||g.has(page))&&!r.has(page);
      const isOverride=(!inBase&&effective)||(inBase&&!effective);
      return React.createElement('div',{key:page,className:'perm-toggle'},
        React.createElement('div',null,
          React.createElement('div',{className:'perm-page',style:{color:effective?'var(--t)':'var(--tm)'}},PAGE_LABELS[page]||page),
          React.createElement('div',{className:'perm-src'},isOverride?'override':inBase?'role default':'not in role')),
        React.createElement(Toggle,{on:effective,onChange:()=>toggle(page)}));
    }),
    React.createElement('div',{style:{padding:'12px 14px'}},
      React.createElement('button',{className:`btn btn-primary btn-sm`,style:{width:'100%'},onClick:save,disabled:saving},
        saved?'✓ Saved':saving?'Saving…':'Save Permissions')));
}

          :filtered.length===0
            ?React.createElement('div',{className:'empty-state'},React.createElement('div',{className:'es-msg'},search?'No matches':'No users'))
            :filtered.map(u=>React.createElement(UserRow,{key:u.id,u,selected:selectedId===u.id,onClick:()=>setSelectedId(u.id)}))),
      // USER DETAIL
      React.createElement('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
        selectedId
          ?React.createElement(UserDetail,{key:selectedId,userId:selectedId,currentAdminId:currentUser?.id,onRefresh:loadUsers})
          :React.createElement('div',{className:'empty-state',style:{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
            React.createElement('div',{className:'es-icon'},'👤'),
            React.createElement('div',{className:'es-msg'},'Select a user to view full details')))));
}

function ReportsPage({bets}){
  const chartRef=useRef();
  const settled=bets.filter(b=>b.result&&b.result!=='PENDING');
  const wins=settled.filter(b=>b.result==='WIN').length;
  const totalPL=settled.reduce((s,b)=>s+(+b.pl||0),0);
  const avgOdds=settled.length>0?settled.reduce((s,b)=>s+(+b.odds||0),0)/settled.length:0;

  useEffect(()=>{
    if(!chartRef.current||settled.length===0)return;
    const existing=Chart.getChart(chartRef.current);if(existing)existing.destroy();
    let cum=0;
    const data=settled.map(b=>{cum+=(+b.pl||0);return cum});
    new Chart(chartRef.current.getContext('2d'),{
      type:'line',
      data:{labels:settled.map((_,i)=>i+1),datasets:[{label:'Cumulative P/L',data,borderColor:'#c41111',backgroundColor:'rgba(196,17,17,.1)',fill:true,tension:.4,pointRadius:0}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#6b6e82',callback:v=>`$${v.toFixed(0)}`},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#6b6e82'},grid:{display:false}}}}
    });
  },[bets]);

  return React.createElement('div',{className:'page-pad'},
    React.createElement('div',{className:'page-title'},'Race Reports & Analytics'),
    React.createElement('div',{className:'grid-4',style:{marginBottom:16}},
      [{l:'Total Bets',v:settled.length,c:'var(--t)'},{l:'Win Rate',v:settled.length>0?`${Math.round(wins/settled.length*100)}%`:'–',c:'var(--green)'},{l:'Total P/L',v:fmtPL(totalPL),c:plColor(totalPL)},{l:'Avg Odds',v:avgOdds>0?`\$${avgOdds.toFixed(2)}`:'–',c:'var(--amber)'}]
        .map(m=>React.createElement('div',{key:m.l,className:'metric-card'},
          React.createElement('div',{className:'mc-val',style:{color:m.c}},m.v),
          React.createElement('div',{className:'mc-lbl'},m.l)))),
    React.createElement('div',{className:'panel'},
      React.createElement('div',{className:'ph'},React.createElement('span',{className:'ph-title'},'Cumulative P/L Curve')),
      React.createElement('div',{className:'chart-container'},
        settled.length>0
          ?React.createElement('canvas',{ref:chartRef,height:200})
          :React.createElement('div',{className:'empty-state',style:{padding:60}},React.createElement('div',{className:'es-msg'},'Settle some bets to see your P/L curve')))));
}

// ──────────────────────────────────────────────
// MAIN APP
// ──────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');
  const [races,setRaces]=useState(DEMO_RACES);
  const [selectedRace,setSelectedRace]=useState(null);
  const [bets,setBets]=useState([]);
  const [bankroll,setBankroll]=useState(10000);
  const [sessionPL,setSessionPL]=useState(0);
  const [hotAlerts,setHotAlerts]=useState([]);
  const [hotCount,setHotCount]=useState(0);
  const [envMode,setEnvMode]=useState('LIVE');
  const [loading,setLoading]=useState(false);
  const dismissedHotBets=useRef(new Set());

  // Restore token & user on mount
  useEffect(()=>{
    const t=API.getToken();
    if(t){
      API.get('/api/auth/me').then(r=>{
        if(r?.username)setUser(r);
      });
    }
  },[]);

  // Load races & bankroll
  useEffect(()=>{
    if(!user)return;
    API.get('/api/env').then(r=>{if(r?.mode)setEnvMode(r.mode)});
    API.get('/api/races/upcoming').then(r=>{if(Array.isArray(r)&&r.length>0)setRaces(r)});
    API.get('/api/state').then(r=>{if(r?.bankroll)setBankroll(+r.bankroll)});
    API.get('/api/session/pl').then(r=>{if(r?.total!=null)setSessionPL(r.total)});
    API.get('/api/bets').then(r=>{if(Array.isArray(r))setBets(r)});
  },[user]);

  // Hot bet detection
  useEffect(()=>{
    const hot=races.filter(r=>r.signal_data?.hot_bet&&!dismissedHotBets.current.has(r.race_uid||r.id));
    setHotCount(hot.length);
    if(hot.length>0&&hotAlerts.length===0){
      setHotAlerts([hot[0]]);
    }
  },[races]);

  function dismissHotAlert(race){
    dismissedHotBets.current.add(race.race_uid||race.id);
    setHotAlerts(prev=>prev.filter(r=>(r.race_uid||r.id)!==(race.race_uid||race.id)));
  }

  function handleSelectRace(race){
    setSelectedRace(race);
    setPage('live');
  }

  function handleAddBet(bet){
    setBets(prev=>[{...bet,result:'PENDING',pl:0,id:Date.now(),...bet},...prev]);
    API.post('/api/bet/log',bet);
  }

  function handleSettleBet(bet,result){
    const stake=+bet.stake||0;const odds=+bet.odds||2;
    const pl=result==='WIN'?+(stake*(odds-1)).toFixed(2):result==='PLACE'?+(stake*0.4).toFixed(2):+(-stake).toFixed(2);
    setBets(prev=>prev.map(b=>b.id===bet.id?{...b,result,pl}:b));
    setBankroll(prev=>+(prev+pl).toFixed(2));
    setSessionPL(prev=>+(prev+pl).toFixed(2));
    if(bet.id)API.post('/api/bet/settle',{id:bet.id,result});
  }

  function handleClearBet(){
    setBets(prev=>prev.filter(b=>b.result&&b.result!=='PENDING'));
  }

  async function handleLogout(){
    await API.post('/api/auth/logout');
    API.setToken(null);
    setUser(null);setBets([]);setBankroll(10000);setSessionPL(0);setSelectedRace(null);setPage('home');
  }

  if(!user)return React.createElement(LoginPage,{onLogin:u=>{setUser(u);setPage('home')}});

  const ROLE_PAGES={admin:new Set(['home','live','betting','reports','simulator','ai_learning','settings','audit','users']),operator:new Set(['home','live','betting','reports']),viewer:new Set(['home','reports'])};
  const allowed=ROLE_PAGES[user.role]||ROLE_PAGES.viewer;
  if(!allowed.has(page))setPage('home');

  function renderPage(){
    switch(page){
      case 'home':     return React.createElement(HomePage,{races,onSelectRace:handleSelectRace,hotAlerts});
      case 'live':     return React.createElement(LiveRacePage,{race:selectedRace||races[0],bankroll,bets,onBet:handleAddBet});
      case 'betting':  return React.createElement(BettingPage,{bets,bankroll,sessionPL,onSettleBet:handleSettleBet,onClearBet:handleClearBet});
      case 'reports':  return React.createElement(ReportsPage,{bets});
      case 'simulator':return React.createElement(SimulatorPage,{race:selectedRace||races[0]});
      case 'ai_learning':return React.createElement(AILearningPage);
      case 'settings': return React.createElement(SettingsPage);
      case 'audit':    return React.createElement(AuditLogPage);
      case 'users':    return React.createElement(UsersPage,{currentUser:{id:user?.id||user?.sub,role:user?.role}});
      default:         return React.createElement(HomePage,{races,onSelectRace:handleSelectRace});
    }
  }

  return React.createElement('div',{className:'app'},
    React.createElement(Sidebar,{user,page,setPage,hotCount,onLogout:handleLogout}),
    React.createElement('div',{className:'main',style:{borderTop:envMode==='TEST'?'2px solid var(--amber)':'none'}},
      React.createElement(TopBar,{bankroll,sessionPL,envMode}),
      React.createElement('div',{className:'content'},
        renderPage())),
    hotAlerts.map(race=>React.createElement(HotBetAlert,{key:race.race_uid||race.id,race,onDismiss:()=>dismissHotAlert(race)})));
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
