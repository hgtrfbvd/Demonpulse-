<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DemonPulse V8</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
body{
  margin:0;
  background:#05050a;
  color:#fff;
  font-family:'Share Tech Mono', monospace;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.login img{
  width:320px;
  margin-bottom:30px;
}

.input{
  background:#111120;
  border:1px solid #222;
  padding:12px;
  margin:6px;
  color:#fff;
  width:240px;
}

.btn{
  background:#ff1f1f;
  border:none;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
  width:260px;
}

/* APP */
.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#0d0d1a;
  padding:20px;
}

.logo{
  font-family:'Orbitron';
  color:#ff1f1f;
  font-size:18px;
}

.nav div{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

.nav div:hover{
  background:#1a1a2a;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.card{
  background:#111120;
  padding:15px;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const {useState,useEffect}=React;

/* API */
const API={
  async get(url){
    try{
      const r=await fetch(url);
      return await r.json();
    }catch{
      return null;
    }
  },
  async post(url,data){
    try{
      const r=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
      });
      return await r.json();
    }catch{
      return null;
    }
  }
};

/* LOGIN */
function Login({onLogin}){
  const [u,setU]=useState('');
  const [p,setP]=useState('');

  async function login(){
    const res=await API.post('/api/auth/login',{username:u,password:p});
    if(res?.ok) onLogin(res.user);
    else alert('Login failed');
  }

  return React.createElement('div',{className:'login'},
    React.createElement('img',{src:'/static/IMG_1375.jpeg'}),
    React.createElement('input',{className:'input',placeholder:'Username',onChange:e=>setU(e.target.value)}),
    React.createElement('input',{className:'input',type:'password',placeholder:'Password',onChange:e=>setP(e.target.value)}),
    React.createElement('button',{className:'btn',onClick:login},'LOGIN')
  );
}

/* PAGES */
function Dashboard(){
  const [races,setRaces]=useState([]);

  useEffect(()=>{
    API.get('/api/races/upcoming').then(d=>{
      if(d) setRaces(d);
    });
  },[]);

  return React.createElement('div',null,
    React.createElement('h2',null,'Upcoming Races'),
    races.length===0 ?
      React.createElement('div',null,'No data') :
      races.map(r=>
        React.createElement('div',{className:'card',key:r.race_uid},
          r.track+' R'+r.race_num+' - '+(r.distance||'')
        )
      )
  );
}

function Live(){
  return React.createElement('div',null,'Live Race (coming)');
}

function Betting(){
  return React.createElement('div',null,'Betting Panel');
}

function Reports(){
  return React.createElement('div',null,'Reports');
}

function Settings(){
  return React.createElement('div',null,'Settings');
}

/* APP */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('home');

  if(!user) return React.createElement(Login,{onLogin:setUser});

  const pages={
    home:Dashboard,
    live:Live,
    betting:Betting,
    reports:Reports,
    settings:Settings
  };

  const Page=pages[page];

  return React.createElement('div',{className:'app'},
    React.createElement('div',{className:'sidebar'},
      React.createElement('div',{className:'logo'},'DEMONPULSE'),
      React.createElement('div',{className:'nav'},
        ['home','live','betting','reports','settings'].map(p=>
          React.createElement('div',{key:p,onClick:()=>setPage(p)},p.toUpperCase())
        )
      )
    ),
    React.createElement('div',{className:'main'},
      React.createElement(Page)
    )
  );
}

/* MOUNT */
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(App)
);
</script>
</body>
</html>
