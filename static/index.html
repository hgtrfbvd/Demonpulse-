<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DemonPulse V8</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
body{
  margin:0;
  background:#05050a;
  color:#fff;
  font-family:'Share Tech Mono', monospace;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.login img{
  width:320px;
  margin-bottom:30px;
}

.input{
  background:#111120;
  border:1px solid #222;
  padding:12px;
  margin:6px;
  color:#fff;
  width:240px;
}

.btn{
  background:#ff1f1f;
  border:none;
  padding:12px;
  margin-top:10px;
  cursor:pointer;
  width:260px;
}

/* APP */
.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#0d0d1a;
  padding:20px;
}

.logo{
  font-family:'Orbitron';
  color:#ff1f1f;
  font-size:18px;
}

.nav div{
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

.nav div:hover{
  background:#1a1a2a;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.card{
  background:#111120;
  padding:15px;
  margin-bottom:10px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const {useState,useEffect}=React;

/* API */
const API={
  async request(url,options={}){
    const r=await fetch(url,{
      credentials:'same-origin',
      headers:{
        'Content-Type':'application/json',
        ...(options.headers||{})
      },
      ...options
    });

    let data=null;
    try{
      data=await r.json();
    }catch(e){
      data={error:'Invalid JSON response'};
    }

    return {
      ok:r.ok,
      status:r.status,
      data
    };
  },
  get(url){
    return this.request(url);
  },
  post(url,data){
    return this.request(url,{
      method:'POST',
      body:JSON.stringify(data||{})
    });
  }
};

/* LOGIN */
function Login({onLogin}){
  const [u,setU]=useState('');
  const [p,setP]=useState('');
  const [loading,setLoading]=useState(false);

  async function login(){
    if(loading) return;
    setLoading(true);

    try{
      const res=await API.post('/api/auth/login',{username:u,password:p});

      if(res.ok && res.data?.user){
        onLogin(res.data.user);
      }else{
        alert(res.data?.error || `Login failed (${res.status})`);
      }

    }catch(e){
      alert(e.message || 'Login request crashed');
    }

    setLoading(false);
  }

  return React.createElement(
    'div',
    {className:'login'},
    React.createElement('input',{
      placeholder:'Username',
      value:u,
      onChange:e=>setU(e.target.value)
    }),
    React.createElement('input',{
      type:'password',
      placeholder:'Password',
      value:p,
      onChange:e=>setP(e.target.value)
    }),
    React.createElement('button',{
      onClick:login,
      disabled:loading
    }, loading ? '...' : 'LOGIN')
  );
}

/* DASHBOARD */
function Dashboard(){
  const [races,setRaces]=useState([]);

  useEffect(()=>{
    API.get('/api/races/upcoming').then(res=>{
      if(res.ok && Array.isArray(res.data)){
        setRaces(res.data);
      }
    });
  },[]);

  return React.createElement(
    'div',
    null,
    React.createElement('h2',null,'Upcoming Races'),
    races.length===0
      ? React.createElement('div',null,'No data')
      : races.map(r=>
          React.createElement('div',{key:r.race_uid},
            `${r.track} R${r.race_num}`
          )
        )
  );
}

/* APP */
function App(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    API.get('/api/auth/me').then(res=>{
      if(res.ok && res.data?.id){
        setUser(res.data);
      }
      setLoading(false);
    });
  },[]);

  if(loading){
    return React.createElement('div',null,'Loading...');
  }

  if(!user){
    return React.createElement(Login,{onLogin:setUser});
  }

  return React.createElement(Dashboard);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(App)
);
</script>
