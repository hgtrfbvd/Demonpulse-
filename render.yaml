services:
  - type: web
    name: demonpulse-v8
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DP_ENV
        value: LIVE
      - key: SESSION_TIMEOUT_MIN
        value: "480"
